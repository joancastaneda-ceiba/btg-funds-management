<p>transaction-history works!</p>

<div class="container">

    <table mat-table [dataSource]="transactions" class="mat-elevation-z2">

        <!-- FECHA -->
        <ng-container matColumnDef="date">
            <th mat-header-cell *matHeaderCellDef>Fecha</th>
            <td mat-cell *matCellDef="let t">
                {{ t.date | date:'short' }}
            </td>
        </ng-container>

        <!-- FONDO -->
        <ng-container matColumnDef="fund">
            <th mat-header-cell *matHeaderCellDef>Fondo</th>
            <td mat-cell *matCellDef="let t">
                {{ t.fundName }}
            </td>
        </ng-container>

        <!-- TIPO -->
        <ng-container matColumnDef="type">
            <th mat-header-cell *matHeaderCellDef>Tipo</th>
            <td mat-cell *matCellDef="let t">

                <span [ngClass]="{
                'subscription': t.type === 'SUBSCRIPTION',
                'cancel': t.type === 'CANCEL'
              }">

                    {{ t.type }}

                </span>

            </td>
        </ng-container>

        <!-- MONTO -->
        <ng-container matColumnDef="amount">
            <th mat-header-cell *matHeaderCellDef>Monto</th>
            <td mat-cell *matCellDef="let t">
                {{ t.amount | currency:'COP' }}
            </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    </table>

</div>
