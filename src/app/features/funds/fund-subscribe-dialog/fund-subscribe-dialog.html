<mat-dialog-content>

    <p>
        {{ data.name }}
    </p>

    <mat-form-field appearance="outline" class="full-width">

        <mat-label>Monto a invertir</mat-label>

        <input matInput type="number" [(ngModel)]="amount" [min]="data.minimumAmount">

        <mat-hint>
            Monto mínimo: {{ data.minimumAmount | currency:'COP' }}
        </mat-hint>

    </mat-form-field>


    <mat-form-field appearance="outline" class="full-width">

        <mat-label>Método de notificación</mat-label>

        <mat-select [(ngModel)]="notification">

            <mat-option value="EMAIL">
                Email
            </mat-option>

            <mat-option value="SMS">
                SMS
            </mat-option>

        </mat-select>

    </mat-form-field>

</mat-dialog-content>

<mat-dialog-actions align="end">

    <button mat-button (click)="dialogRef.close()">

        Cancelar

    </button>

    <button mat-raised-button color="primary" (click)="confirm()">

        Confirmar

    </button>

</mat-dialog-actions>
